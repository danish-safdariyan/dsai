name: 12-train-r

on:
  workflow_dispatch:
  schedule:
    - cron: "30 9 * * 1"

permissions:
  contents: write

jobs:
  train_r:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 12_end
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Cache and install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: 12_end
          packages: |
            any::DBI
            any::RSQLite
            any::dplyr
            any::lubridate
            any::xgboost
            any::jsonlite
            any::httr2
            any::tibble
            any::purrr

      - name: Ensure training data exists
        run: Rscript 01_ingest_traffic.R

      - name: Train model (R)
        run: Rscript 02_train_model.R

      - name: Upload xgboost-model artifact
        uses: actions/upload-artifact@v4
        with:
          name: xgboost-model
          path: |
            12_end/data/modelr.json
            12_end/data/validationr.json
          if-no-files-found: error

      - name: Commit model outputs (if changed)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(12_end): retrain R xgboost model"
          file_pattern: |
            12_end/data/modelr.json
            12_end/data/validationr.json
